# Blackwell Inference Server - Nginx Reverse Proxy Configuration
# Place in /etc/nginx/sites-available/blackwell
# Symlink from /etc/nginx/sites-enabled/blackwell

upstream blackwell_backend {
    server 127.0.0.1:8123;
    keepalive 32;
}

server {
    listen 8080;
    server_name _;

    # Request logging
    access_log /var/log/nginx/blackwell_access.log;
    error_log /var/log/nginx/blackwell_error.log;

    # Large client body size for batch requests
    client_max_body_size 1M;
    client_body_timeout 300s;

    # Health check (no proxy)
    location = /health {
        proxy_pass http://blackwell_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Don't cache health endpoint
        add_header Cache-Control "no-store";
    }

    # API endpoints
    location /v1/ {
        proxy_pass http://blackwell_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root redirect
    location / {
        return 404 '{"error":"Not found"}';
        add_header Content-Type application/json;
    }

    # Rate limiting (optional)
    # limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # location /v1/ {
    #     limit_req zone=api burst=20 nodelay;
    # }
}